<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Projects optimize for delivery; platforms optimize for leverage">
  <rect width="1200" height="470" fill="#f8fafc"/>
  <text x="600" y="56" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Projects vs. Platforms</text>
  <text x="600" y="86" text-anchor="middle" font-size="16" fill="#64748b">The same benchmark, two engineering philosophies</text>

  <!-- column headers -->
  <rect x="120" y="118" width="450" height="52" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="345" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#b45309">PROJECT  ·  Claude Code</text>
  <rect x="630" y="118" width="450" height="52" rx="12" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="855" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#4338ca">PLATFORM  ·  + Neo MCP</text>

  <!-- rows -->
  <g font-size="17">
    <!-- row 1 -->
    <rect x="120" y="186" width="450" height="58" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
    <text x="146" y="221" fill="#334155">Optimizes for <tspan font-weight="700" fill="#b45309">delivery</tspan></text>
    <rect x="630" y="186" width="450" height="58" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
    <text x="656" y="221" fill="#334155">Optimizes for <tspan font-weight="700" fill="#4338ca">leverage</tspan></text>

    <!-- row 2 -->
    <rect x="120" y="252" width="450" height="58" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
    <text x="146" y="287" fill="#334155">Solves an <tspan font-weight="700" fill="#b45309">immediate need</tspan></text>
    <rect x="630" y="252" width="450" height="58" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
    <text x="656" y="287" fill="#334155">Creates <tspan font-weight="700" fill="#4338ca">reusable capabilities</tspan></text>

    <!-- row 3 -->
    <rect x="120" y="318" width="450" height="58" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
    <text x="146" y="353" fill="#334155">Logic <tspan font-weight="700" fill="#b45309">coupled</tspan> to the benchmark</text>
    <rect x="630" y="318" width="450" height="58" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
    <text x="656" y="353" fill="#334155">Concerns behind <tspan font-weight="700" fill="#4338ca">extension points</tspan></text>

    <!-- row 4 -->
    <rect x="120" y="384" width="450" height="58" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
    <text x="146" y="419" fill="#334155"><tspan font-weight="700" fill="#b45309">Owned</tspan> by one team</text>
    <rect x="630" y="384" width="450" height="58" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
    <text x="656" y="419" fill="#334155"><tspan font-weight="700" fill="#4338ca">Consumed</tspan> by many teams</text>
  </g>
</svg>
