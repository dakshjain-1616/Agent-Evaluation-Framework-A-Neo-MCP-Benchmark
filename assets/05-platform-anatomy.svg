<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Anatomy of the platform: an evaluation layer composing a self-healing core through interfaces">
  <rect width="1200" height="600" fill="#0f172a"/>
  <text x="600" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#f8fafc">Anatomy of the platform</text>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#94a3b8">The evaluation layer is a separate capability that <tspan fill="#a5b4fc">composes</tspan> the self-healing core through its interfaces — zero edits to the core.</text>

  <!-- EVAL LAYER -->
  <rect x="80" y="110" width="1040" height="170" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.8"/>
  <text x="108" y="142" font-size="14" font-weight="700" letter-spacing="1.5" fill="#a5b4fc">EVALUATION LAYER · neo_mcp/evaluation/  (87 tests)</text>
  <g font-size="13.5">
    <rect x="108" y="158" width="150" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="183" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Datasets</text>
    <text x="183" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">InMemory · JSONL</text>

    <rect x="272" y="158" width="150" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="347" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Scoring</text>
    <text x="347" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">4 metrics + agg</text>

    <rect x="436" y="158" width="150" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="511" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Runner</text>
    <text x="511" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">batch · async</text>

    <rect x="600" y="158" width="150" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="675" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Regression</text>
    <text x="675" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">baseline + detect</text>

    <rect x="764" y="158" width="150" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="839" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Review</text>
    <text x="839" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">human queue</text>

    <rect x="928" y="158" width="164" height="92" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="1010" y="200" text-anchor="middle" fill="#e0e7ff" font-weight="600">Eval Instrument.</text>
    <text x="1010" y="220" text-anchor="middle" fill="#a5b4fc" font-size="11">composes core</text>
  </g>

  <!-- INTERFACE SEAM -->
  <text x="600" y="312" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="2" fill="#64748b">———  CONSUMED THROUGH INTERFACES  (no core edits)  ———</text>
  <g stroke="#475569" stroke-width="2" stroke-dasharray="5 5">
    <line x1="183" y1="280" x2="183" y2="360"/>
    <line x1="511" y1="280" x2="511" y2="360"/>
    <line x1="839" y1="280" x2="839" y2="360"/>
    <line x1="1010" y1="280" x2="1010" y2="360"/>
  </g>

  <!-- SELF-HEALING CORE -->
  <rect x="80" y="360" width="1040" height="200" rx="16" fill="#172554" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="108" y="392" font-size="14" font-weight="700" letter-spacing="1.5" fill="#7dd3fc">SELF-HEALING CORE · neo_mcp/  (137 tests · untouched)</text>
  <g font-size="13.5">
    <rect x="108" y="408" width="190" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="203" y="438" text-anchor="middle" fill="#e0f2fe" font-weight="600">SelfHealingAgent</text>
    <text x="203" y="457" text-anchor="middle" fill="#7dd3fc" font-size="11">plan → run → recover</text>

    <rect x="312" y="408" width="190" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="407" y="438" text-anchor="middle" fill="#e0f2fe" font-weight="600">Planners</text>
    <text x="407" y="457" text-anchor="middle" fill="#7dd3fc" font-size="11">Fixed · LLM</text>

    <rect x="516" y="408" width="190" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="611" y="438" text-anchor="middle" fill="#e0f2fe" font-weight="600">Recovery state machine</text>
    <text x="611" y="457" text-anchor="middle" fill="#7dd3fc" font-size="11">classify·repair·retry·verify</text>

    <rect x="720" y="408" width="180" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="810" y="438" text-anchor="middle" fill="#e0f2fe" font-weight="600">Executor + Registry</text>
    <text x="810" y="457" text-anchor="middle" fill="#7dd3fc" font-size="11">tool dispatch</text>

    <rect x="914" y="408" width="178" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="1003" y="438" text-anchor="middle" fill="#e0f2fe" font-weight="600">Instrumentation</text>
    <text x="1003" y="457" text-anchor="middle" fill="#7dd3fc" font-size="11">traces·metrics·logs</text>
  </g>
  <text x="600" y="512" text-anchor="middle" font-size="13.5" fill="#cbd5e1">Every box is an interface with a default implementation — swap a planner, metric, or dataset without touching the rest.</text>
  <text x="600" y="538" text-anchor="middle" font-size="13.5" font-weight="600" fill="#7dd3fc">Add a capability category, not a rewrite. That is the platform difference.</text>
</svg>
