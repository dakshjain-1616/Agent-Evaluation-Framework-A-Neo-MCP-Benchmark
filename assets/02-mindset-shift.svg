<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The question shifted from how do we evaluate this agent to how do we evaluate every future agent">
  <rect width="1200" height="360" fill="#0f172a"/>
  <text x="600" y="56" text-anchor="middle" font-size="20" font-weight="600" letter-spacing="2" fill="#94a3b8">THE SHIFT IN THE QUESTION</text>

  <!-- before -->
  <rect x="70" y="110" width="440" height="170" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="100" y="152" font-size="14" font-weight="700" letter-spacing="1.5" fill="#f59e0b">WITHOUT NEO MCP</text>
  <text x="100" y="198" font-size="23" font-weight="700" fill="#f8fafc">How do we evaluate</text>
  <text x="100" y="230" font-size="23" font-weight="700" fill="#f8fafc"><tspan fill="#fbbf24">this</tspan> agent?</text>
  <text x="100" y="262" font-size="14" fill="#94a3b8">A problem solved once.</text>

  <!-- arrow -->
  <g>
    <line x1="540" y1="195" x2="650" y2="195" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
    <polygon points="650,184 672,195 650,206" fill="#6366f1"/>
  </g>

  <!-- after -->
  <rect x="690" y="110" width="440" height="170" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="720" y="152" font-size="14" font-weight="700" letter-spacing="1.5" fill="#818cf8">WITH NEO MCP</text>
  <text x="720" y="198" font-size="23" font-weight="700" fill="#f8fafc">How do we evaluate</text>
  <text x="720" y="230" font-size="23" font-weight="700" fill="#f8fafc"><tspan fill="#a5b4fc">every future</tspan> agent</text>
  <text x="720" y="262" font-size="14" fill="#94a3b8">A problem prevented from recurring.</text>

  <text x="600" y="330" text-anchor="middle" font-size="15" fill="#cbd5e1">One shift in perspective changed almost every architectural decision that followed.</text>
</svg>
